<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Softoi - Blooming Garden Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #fff;
  }

  .spacer {
    height: 100vh;
    background: linear-gradient(180deg, #ffffff 0%, #fff5f7 100%);
  }

  /* ============ BLOOM SECTION ============ */
  .bloom-section {
    position: relative;
    width: 100%;
    background: linear-gradient(180deg, #fff5f7 0%, #fde8ef 100%);
    padding: 60px 0 0;
    overflow: hidden;
    min-height: 380px;
  }

  .bloom-container {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 30px;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 20px;
    flex-wrap: nowrap;
    position: relative;
    z-index: 2;
  }

  /* Different flower sizes */
  .flower            { width: 140px; height: auto; transform-origin: bottom center; }
  .flower.size-sm    { width: 80px; }
  .flower.size-md    { width: 110px; }
  .flower.size-lg    { width: 150px; }
  .flower.size-xl    { width: 170px; }

  /* ---- STEM & LEAF: sketch-draw effect ---- */
  .flower .stem,
  .flower .leaf {
    stroke-dasharray: 300;
    stroke-dashoffset: 300;
    animation-play-state: paused;
  }

  .flower .leaf {
    stroke-dasharray: 100;
    stroke-dashoffset: 100;
  }

  .flower .bloom {
    transform-origin: 100px 110px;
    transform: scale(0);
    opacity: 0;
    animation-play-state: paused;
  }

  .flower .center-dot {
    transform-origin: center;
  }

  /* Trigger animations when section enters viewport */
  .bloom-section.in-view .flower .stem {
    animation: draw 2s ease-out forwards;
  }
  .bloom-section.in-view .flower .leaf {
    animation: draw 1s ease-out forwards;
  }
  .bloom-section.in-view .flower .bloom {
    animation: bloom 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  .bloom-section.in-view .flower .center-dot {
    animation: pulse 2s ease-in-out infinite;
  }

  /* Whole flower sway — starts AFTER bloom */
  .bloom-section.in-view .flower {
    animation: sway 4s ease-in-out infinite;
  }

  /* Stagger each flower (7 flowers) */
  .bloom-section.in-view .flower-1 .stem { animation-delay: 0.1s; }
  .bloom-section.in-view .flower-1 .leaf { animation-delay: 1.3s; }
  .bloom-section.in-view .flower-1 .bloom { animation-delay: 2.1s; }
  .bloom-section.in-view .flower-1 .center-dot { animation-delay: 3.3s; }
  .bloom-section.in-view .flower-1 { animation-delay: 3.5s; }

  .bloom-section.in-view .flower-2 .stem { animation-delay: 0.4s; }
  .bloom-section.in-view .flower-2 .leaf { animation-delay: 1.6s; }
  .bloom-section.in-view .flower-2 .bloom { animation-delay: 2.4s; }
  .bloom-section.in-view .flower-2 .center-dot { animation-delay: 3.6s; }
  .bloom-section.in-view .flower-2 { animation-delay: 3.8s; animation-duration: 4.5s; }

  .bloom-section.in-view .flower-3 .stem { animation-delay: 0.7s; }
  .bloom-section.in-view .flower-3 .leaf { animation-delay: 1.9s; }
  .bloom-section.in-view .flower-3 .bloom { animation-delay: 2.7s; }
  .bloom-section.in-view .flower-3 .center-dot { animation-delay: 3.9s; }
  .bloom-section.in-view .flower-3 { animation-delay: 4.1s; animation-duration: 3.8s; }

  .bloom-section.in-view .flower-4 .stem { animation-delay: 1.0s; }
  .bloom-section.in-view .flower-4 .leaf { animation-delay: 2.2s; }
  .bloom-section.in-view .flower-4 .bloom { animation-delay: 3.0s; }
  .bloom-section.in-view .flower-4 .center-dot { animation-delay: 4.2s; }
  .bloom-section.in-view .flower-4 { animation-delay: 4.4s; animation-duration: 5s; }

  .bloom-section.in-view .flower-5 .stem { animation-delay: 1.3s; }
  .bloom-section.in-view .flower-5 .leaf { animation-delay: 2.5s; }
  .bloom-section.in-view .flower-5 .bloom { animation-delay: 3.3s; }
  .bloom-section.in-view .flower-5 .center-dot { animation-delay: 4.5s; }
  .bloom-section.in-view .flower-5 { animation-delay: 4.7s; animation-duration: 4.2s; }

  .bloom-section.in-view .flower-6 .stem { animation-delay: 1.6s; }
  .bloom-section.in-view .flower-6 .leaf { animation-delay: 2.8s; }
  .bloom-section.in-view .flower-6 .bloom { animation-delay: 3.6s; }
  .bloom-section.in-view .flower-6 .center-dot { animation-delay: 4.8s; }
  .bloom-section.in-view .flower-6 { animation-delay: 5s; animation-duration: 4.6s; }

  .bloom-section.in-view .flower-7 .stem { animation-delay: 1.9s; }
  .bloom-section.in-view .flower-7 .leaf { animation-delay: 3.1s; }
  .bloom-section.in-view .flower-7 .bloom { animation-delay: 3.9s; }
  .bloom-section.in-view .flower-7 .center-dot { animation-delay: 5.1s; }
  .bloom-section.in-view .flower-7 { animation-delay: 5.3s; animation-duration: 3.6s; }

  /* ---- KEYFRAMES ---- */
  @keyframes draw {
    to { stroke-dashoffset: 0; }
  }

  @keyframes bloom {
    0%   { transform: scale(0) rotate(-30deg); opacity: 0; }
    60%  { transform: scale(1.15) rotate(5deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.2); }
  }

  /* Gentle whole-flower sway (like a breeze) */
  @keyframes sway {
    0%, 100% { transform: rotate(-2deg); }
    50%      { transform: rotate(2deg); }
  }

  /* ============ BUTTERFLIES ============ */
  .butterfly {
    position: absolute;
    width: 40px;
    height: 40px;
    z-index: 3;
    opacity: 0;
    pointer-events: none;
  }

  .butterfly .wing {
    transform-origin: center;
    animation: flap 0.25s ease-in-out infinite;
  }

  @keyframes flap {
    0%, 100% { transform: scaleX(1); }
    50%      { transform: scaleX(0.4); }
  }

  /* Butterfly flight paths */
  .butterfly-1 {
    width: 35px; height: 35px;
    animation: fly1 14s ease-in-out infinite;
    animation-delay: 3s;
  }
  .butterfly-2 {
    width: 28px; height: 28px;
    animation: fly2 16s ease-in-out infinite;
    animation-delay: 4s;
  }
  .butterfly-3 {
    width: 42px; height: 42px;
    animation: fly3 18s ease-in-out infinite;
    animation-delay: 5s;
  }

  @keyframes fly1 {
    0%   { left: -5%; top: 70%; opacity: 0; transform: rotate(-10deg); }
    10%  { opacity: 1; }
    25%  { left: 25%; top: 30%; transform: rotate(15deg); }
    50%  { left: 55%; top: 50%; transform: rotate(-15deg); }
    75%  { left: 80%; top: 25%; transform: rotate(20deg); }
    95%  { opacity: 1; }
    100% { left: 110%; top: 40%; opacity: 0; transform: rotate(0deg); }
  }

  @keyframes fly2 {
    0%   { left: 105%; top: 50%; opacity: 0; transform: rotate(180deg); }
    10%  { opacity: 1; }
    30%  { left: 70%; top: 20%; transform: rotate(160deg); }
    55%  { left: 40%; top: 60%; transform: rotate(200deg); }
    80%  { left: 10%; top: 35%; transform: rotate(170deg); }
    95%  { opacity: 1; }
    100% { left: -10%; top: 50%; opacity: 0; transform: rotate(180deg); }
  }

  @keyframes fly3 {
    0%   { left: 30%; top: -10%; opacity: 0; transform: rotate(90deg); }
    10%  { opacity: 1; }
    30%  { left: 50%; top: 40%; transform: rotate(70deg); }
    55%  { left: 20%; top: 55%; transform: rotate(110deg); }
    80%  { left: 60%; top: 65%; transform: rotate(85deg); }
    95%  { opacity: 1; }
    100% { left: 90%; top: 100%; opacity: 0; transform: rotate(90deg); }
  }

  /* ============ FOOTER ============ */
  .footer {
    background: #fde8ef;
    padding: 40px 20px;
    text-align: center;
    color: #8b5a6f;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .bloom-container { gap: 12px; }
    .flower            { width: 90px; }
    .flower.size-sm    { width: 55px; }
    .flower.size-md    { width: 75px; }
    .flower.size-lg    { width: 100px; }
    .flower.size-xl    { width: 115px; }
  }
</style>
</head>

  <!-- ============ FOOTER ============ -->
  <footer class="footer"></footer>

  <script>
    // Trigger bloom when scrolled into view
    const bloomSection = document.getElementById('bloomSection');

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('in-view');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.2 });

    if (bloomSection) observer.observe(bloomSection);
  </script>

</body>
